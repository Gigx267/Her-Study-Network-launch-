<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="HSN Gallery – Moments of Sisterhood. A pure visual journey of faith, prayer, and community.">
    <title>HSN | Gallery — Visual Grace</title>
    <link rel="icon" type="image/png" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,700;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #fff5f7 0%, #ffffff 45%),
                        radial-gradient(circle at 90% 80%, #f0f4fe 0%, #ffffff 100%);
            color: #1e1e2a;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        :root {
            --accent: #9b083e;
            --accent-soft: #c23b64;
            --accent-glow: rgba(155, 8, 62, 0.12);
            --glass-bg: rgba(255, 255, 255, 0.88);
            --shadow-sm: 0 12px 28px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 18px 36px rgba(155, 8, 62, 0.12);
            --shadow-hover: 0 30px 45px rgba(155, 8, 62, 0.18);
            --radius-card: 1.8rem;
            --radius-pill: 100px;
            --transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* --- minimalist glass navigation --- */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-pill);
            padding: 0.55rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .logo img {
            height: 42px;
            width: auto;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .nav-content {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 1.8rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #4a4a5a;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            transition: var(--transition);
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.25s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        .cta-pill {
            background: var(--accent);
            color: white;
            padding: 0.45rem 1.3rem;
            border-radius: var(--radius-pill);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            transition: var(--transition);
            box-shadow: 0 2px 6px rgba(155, 8, 62, 0.2);
        }

        .cta-pill:hover {
            background: #7a062f;
            transform: scale(1.02);
        }

        /* --- minimalist hero (subtle) --- */
        .gallery-hero {
            padding: 150px 1.8rem 2rem;
            text-align: center;
            max-width: 780px;
            margin: 0 auto;
        }

        .eyebrow {
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: rgba(155, 8, 62, 0.08);
            padding: 0.3rem 1.2rem;
            border-radius: var(--radius-pill);
            display: inline-block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.6rem);
            margin: 1.1rem 0 0.5rem;
            font-weight: 700;
            color: #1a1a28;
            letter-spacing: -0.02em;
        }

        /* --- filter bar : minimal but functional --- */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 0 auto 2.2rem;
            max-width: 1000px;
            padding: 0 1rem;
        }

        .filter-btn {
            border: 1px solid rgba(155, 8, 62, 0.28);
            background: rgba(255, 255, 255, 0.9);
            padding: 0.55rem 1.6rem;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition);
            color: #494956;
            backdrop-filter: blur(2px);
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(155, 8, 62, 0.2);
        }

        /* --- GALLERY GRID — pure imagery, no captions, just visual elegance --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.8rem 5rem;
        }

        .gallery-item {
            background: transparent;
            border-radius: var(--radius-card);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(18px);
            animation: fadeUp 0.65s cubic-bezier(0.2, 0.95, 0.4, 1.1) forwards;
            box-shadow: none;
            border: none;
            position: relative;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.01);
        }

        /* image container — 4:5 ratio for elevated editorial look */
        .img-container {
            width: 100%;
            aspect-ratio: 4 / 5;
            overflow: hidden;
            background: #f4edea;
            border-radius: 1.8rem;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
            transition: box-shadow 0.3s ease;
        }

        .gallery-item:hover .img-container {
            box-shadow: var(--shadow-hover);
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.55s ease-out;
            display: block;
            will-change: transform;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.06);
        }

        /* --- LIGHTBOX — refined, immersive, without text distraction --- */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(12, 8, 18, 0.94);
            backdrop-filter: blur(18px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-content {
            max-width: 88vw;
            max-height: 88vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 1.8rem;
            object-fit: contain;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 248, 240, 0.2);
        }

        .close-btn {
            position: absolute;
            top: -52px;
            right: 0px;
            font-size: 2.2rem;
            font-weight: 300;
            cursor: pointer;
            color: white;
            background: rgba(0, 0, 0, 0.55);
            width: 48px;
            height: 48px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: none;
            font-family: monospace;
        }

        .close-btn:hover {
            background: var(--accent);
            transform: scale(1.05);
        }

        /* optional tiny indicator (no text) – just subtle dot nav */
        .lightbox-indicator {
            margin-top: 1rem;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #f3e9de;
        }

        /* no results — minimal */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            font-size: 1rem;
            color: #7a6e6e;
            background: rgba(245, 235, 230, 0.6);
            border-radius: 3rem;
            font-weight: 500;
        }

        /* mobile refinement */
        @media (max-width: 768px) {
            .navbar {
                width: 94%;
                padding: 0.5rem 1.2rem;
                top: 12px;
            }
            .nav-links {
                display: none;
            }
            .gallery-grid {
                gap: 1.2rem;
                padding: 0 1rem 3rem;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            }
            .filter-btn {
                padding: 0.45rem 1.2rem;
                font-size: 0.7rem;
            }
            .gallery-hero {
                padding-top: 120px;
            }
            .close-btn {
                top: -44px;
                right: 0;
                width: 42px;
                height: 42px;
                font-size: 1.8rem;
            }
            .img-container {
                border-radius: 1.4rem;
            }
        }

        /* smoothness & accessibility */
        html {
            scroll-behavior: smooth;
        }
        .filter-btn:focus-visible,
        .close-btn:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

<nav class="navbar" aria-label="Main navigation">
    <a href="index.html" class="logo" aria-label="Homepage">
        <img src="logo.jpg" alt="HSN Sisterhood Emblem">
    </a>
    <div class="nav-content">
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="Gallery.html" class="active">GALLERY</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
        <a href="Register.html" class="cta-pill" aria-label="Join community">✧ Join Us</a>
    </div>
</nav>

<main>
    <section class="gallery-hero">
        <span class="eyebrow">✿ HIS LOVE IN FRAMES ✿</span>
        <h1>visual echoes of sisterhood</h1>
        <!-- brief description minimal — no captions under images, just pure showcase -->
    </section>

    

    <div class="gallery-grid" id="galleryGrid" aria-label="Visual gallery"></div>
</main>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Fullsize image preview">
    <div class="lightbox-content">
        <button class="close-btn" id="closeBtn" aria-label="Close lightbox">✕</button>
        <img id="lightboxImg" src="" alt="Full view of sisterhood moment">
        <!-- No text description line — keeping image-only immersion -->
        <div class="lightbox-indicator" id="lightboxCounter"></div>
    </div>
</div>

<script>
    (function() {
        // ---------- GALLERY DATA : High quality imagery, NO TEXT CAPTIONS UNDER IMAGES ----------
        // Images maintain meaningful alt for accessibility but no textual overlay in grid
        const galleryData = [
            { title: "Teen Club Prayer", category: "prayer", img: "p (1).jpg", altDesc: "Sisters gathered in prayer" },
            { title: "Sharing Scripture", category: "study", img: "p (2).jpg", altDesc: "Evening scripture fellowship" },
            { title: "Sisterhood Embrace", category: "sisterhood", img: "p (3).jpg", altDesc: "Authentic friendship moment" },
            { title: "HSN Festive Event", category: "events", img: "p (4).jpg", altDesc: "Celebration of joy" },
            { title: "Sharing Resources", category: "prayer", img: "p (5).jpg", altDesc: "Generous love in action" },
            { title: "Data Outreach", category: "study", img: "p (6).jpg", altDesc: "Community insights" },
            { title: "Sisterhood Circle", category: "sisterhood", img: "p (7).jpg", altDesc: "Circle of faith" },
            { title: "Annual Gathering", category: "events", img: "p (8).jpg", altDesc: "Joyful annual meeting" },
            { title: "Intercessory Prayer", category: "prayer", img: "p (9).jpg", altDesc: "Prayer warriors unite" },
            { title: "Bible Reflections", category: "study", img: "p (10).jpg", altDesc: "Collective wisdom" },
            { title: "Worship Night", category: "events", img: "p (4).jpg", altDesc: "Praise & testimonies" },    // creative reuse for variety
            { title: "Mentorship Huddle", category: "sisterhood", img: "p (3).jpg", altDesc: "Sister to sister guidance" }
        ];

        const grid = document.getElementById('galleryGrid');
        const filterBar = document.getElementById('filterBar');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxCounter = document.getElementById('lightboxCounter');
        const closeLightboxBtn = document.getElementById('closeBtn');
        
        let currentFilter = 'all';
        let currentLightboxIndex = 0;
        let currentFilteredItems = [];

        // Render clean gallery — only images, absolutely NO text under images (no title, no description)
        function renderImages(filterValue) {
            if (!grid) return;
            
            let itemsToRender = filterValue === 'all' 
                ? [...galleryData] 
                : galleryData.filter(item => item.category === filterValue);
            
            currentFilteredItems = itemsToRender;  // store for lightbox navigation (optional)
            
            grid.innerHTML = '';
            
            if (itemsToRender.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'no-results';
                emptyDiv.textContent = '✨ no images in this category — explore another grace-filled moment ✨';
                grid.appendChild(emptyDiv);
                return;
            }
            
            const fragment = document.createDocumentFragment();
            
            itemsToRender.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'gallery-item';
                card.style.animationDelay = `${Math.min(idx * 0.04, 0.4)}s`;
                
                const imgContainer = document.createElement('div');
                imgContainer.className = 'img-container';
                
                const img = document.createElement('img');
                img.src = item.img;
                img.alt = item.altDesc || `${item.title} - sisterhood moment`;
                img.className = 'gallery-img';
                img.loading = 'lazy';
                img.onerror = function() {
                    this.style.opacity = '0.8';
                    this.style.backgroundColor = '#f0e6e2';
                    this.alt = 'beautiful memory';
                };
                
                imgContainer.appendChild(img);
                card.appendChild(imgContainer);
                
                // ------------------------------------------------------------------
                // STRICTLY no caption elements (no h3, no p, no text under image)
                // ------------------------------------------------------------------
                
                // Lightbox trigger: open full image with a minimal counter (no descriptive paragraph)
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const clickedIndex = currentFilteredItems.findIndex(i => i.img === item.img && i.title === item.title);
                    if (clickedIndex !== -1) currentLightboxIndex = clickedIndex;
                    else currentLightboxIndex = idx;
                    openLightbox(currentLightboxIndex);
                });
                
                fragment.appendChild(card);
            });
            
            grid.appendChild(fragment);
        }
        
        // lightbox with clean imagery (no extra description, only subtle counter)
        function openLightbox(index) {
            if (!currentFilteredItems.length) return;
            const item = currentFilteredItems[index];
            if (!item) return;
            lightboxImg.src = item.img;
            lightboxImg.alt = item.altDesc || 'Sisterhood moment enlarged';
            // Minimal counter e.g., "3 / 12" — no long text, keeps focus on image
            const total = currentFilteredItems.length;
            lightboxCounter.textContent = `${index + 1} / ${total}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function updateLightboxImage() {
            if (!currentFilteredItems.length) return;
            const item = currentFilteredItems[currentLightboxIndex];
            if (item) {
                lightboxImg.src = item.img;
                lightboxImg.alt = item.altDesc || 'Sisterhood visual';
                lightboxCounter.textContent = `${currentLightboxIndex + 1} / ${currentFilteredItems.length}`;
            }
        }
        
        // Navigation inside lightbox (keyboard arrows + click on image edges)
        function nextImage() {
            if (!currentFilteredItems.length) return;
            currentLightboxIndex = (currentLightboxIndex + 1) % currentFilteredItems.length;
            updateLightboxImage();
        }
        
        function prevImage() {
            if (!currentFilteredItems.length) return;
            currentLightboxIndex = (currentLightboxIndex - 1 + currentFilteredItems.length) % currentFilteredItems.length;
            updateLightboxImage();
        }
        
        // Close lightbox
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        // Filter initialization
        function initFilters() {
            if (!filterBar) return;
            const buttons = filterBar.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const filterVal = btn.getAttribute('data-filter');
                    if (!filterVal) return;
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = filterVal;
                    renderImages(currentFilter);
                    // gently scroll to grid for better UX
                    grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            });
        }
        
        function initLightboxEvents() {
            if (!lightbox || !closeLightboxBtn) return;
            closeLightboxBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });
            
            // keyboard controls: Escape, left/right arrows
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'Escape') {
                    closeLightbox();
                } else if (e.key === 'ArrowLeft') {
                    prevImage();
                    e.preventDefault();
                } else if (e.key === 'ArrowRight') {
                    nextImage();
                    e.preventDefault();
                }
            });
            
            // optional: add click on lightbox image edges? we keep simple but robust
            // we also add navigation zones by tapping left/right half of lightbox
            lightbox.addEventListener('click', (e) => {
                if (!lightbox.classList.contains('active')) return;
                const rect = lightbox.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                if (e.target === lightboxImg || e.target.closest('.lightbox-content')) {
                    // left third = previous, right third = next
                    if (clickX < width * 0.33) {
                        prevImage();
                        e.stopPropagation();
                    } else if (clickX > width * 0.67) {
                        nextImage();
                        e.stopPropagation();
                    }
                }
            });
        }
        
        // Preload critical images for performance
        function preloadFirstImages() {
            const uniqueImgs = [...new Map(galleryData.map(item => [item.img, item])).values()];
            uniqueImgs.slice(0, 6).forEach(imgObj => {
                const link = document.createElement('link');
                link.rel = 'preload';
                link.as = 'image';
                link.href = imgObj.img;
                document.head.appendChild(link);
            });
        }
        
        // DOM ready
        document.addEventListener('DOMContentLoaded', () => {
            initFilters();
            initLightboxEvents();
            renderImages('all');
            preloadFirstImages();
            
            // Add subtle keyboard and focus handling for gallery items
            if (grid) {
                grid.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && e.target.closest('.gallery-item')) {
                        e.target.closest('.gallery-item').click();
                    }
                });
            }
            
            // small extra: when filter changes, reset lightbox index and keep fresh
            const originalRender = renderImages;
            window.renderImages = renderImages;
        });
    })();
</script>
</body>
</html>
